<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N1 Flashcard - Ultimate Edition ✅</title>
    <script src="data.js"></script>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --glass: rgba(255, 255, 255, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('bg.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden;
        }
        h2 { color: white; text-shadow: 2px 2px 8px rgba(0,0,0,0.6); margin: 20px 0 10px 0; font-size: 22px; }
        #lessonSelect { width: 85%; padding: 14px; border-radius: 15px; border: none; margin-bottom: 15px; font-size: 16px; font-weight: bold; background: var(--glass); outline: none; touch-action: auto; }

        .container { 
            position: relative; width: 92vw; max-width: 400px; height: 280px; 
            perspective: 1000px; cursor: pointer;
            transition: transform 0.4s ease-out, opacity 0.4s;
        }
        
        .card { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; 
        }
        .card.flipped { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            border-radius: 25px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            padding: 25px; text-align: center;
        }
        .front { font-size: 48px; font-weight: bold; color: #333; z-index: 2; }
        .back { transform: rotateY(180deg); z-index: 1; }
        
        .reading { font-size: 32px; color: var(--danger); font-weight: bold; }
        .meaning { font-size: 22px; color: var(--success); }

        .badge { position: absolute; top: 20px; padding: 8px 18px; border-radius: 10px; color: white; font-weight: bold; opacity: 0; z-index: 100; pointer-events: none; }
        .badge-right { right: 20px; background: var(--success); }
        .badge-left { left: 20px; background: var(--danger); }

        .control-btns { margin-top: 20px; display: flex; gap: 12px; width: 92%; max-width: 420px; touch-action: auto; }
        .btn-action { flex: 1; padding: 18px; border: none; border-radius: 18px; color: white; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .btn-back { background: var(--warning); color: #2c3e50; flex: 0.5; font-size: 20px; }
        .btn-not { background: var(--danger); }
        .btn-done { background: var(--success); }

        .typing-area { width: 92%; max-width: 420px; margin-top: 15px; touch-action: auto; }
        #answerInput { 
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.3); 
            background: rgba(255,255,255,0.2); color: white; font-size: 18px; text-align: center;
            outline: none; transition: all 0.3s;
        }
        
        #status { margin-top: auto; padding-bottom: 25px; color: white; font-weight: bold; }
        #resultView { display: none; text-align: center; background: var(--glass); padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; touch-action: auto; }
        .nav-btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 15px; font-weight: bold; color: white; cursor: pointer; }
        .speaker { margin-top: 15px; font-size: 40px; background: #eee; width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>
    <h2>Học N1 Siêu Cấp ✅</h2>
    <select id="lessonSelect" onchange="initLesson(false)"></select>

    <div id="studyView" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="container" id="mainContainer">
            <div id="badgeDone" class="badge badge-right">THUỘC</div>
            <div id="badgeNot" class="badge badge-left">CHƯA</div>
            
            <div class="card" id="cardElement">
                <div class="card-face front" id="txtFront">...</div>
                <div class="card-face back">
                    <div class="reading" id="txtReading"></div>
                    <div class="meaning" id="txtMeaning"></div>
                    <div class="speaker" onclick="event.stopPropagation(); speak();">🔊</div>
                </div>
            </div>
        </div>

        <div class="control-btns">
            <button class="btn-action btn-back" onclick="goBack()">↩</button>
            <button class="btn-action btn-not" onclick="handleMark(false)">Chưa thuộc</button>
            <button class="btn-action btn-done" onclick="handleMark(true)">Đã thuộc</button>
        </div>

        <div class="typing-area">
            <input type="text" id="answerInput" placeholder="Gõ cách đọc để lật..." autocomplete="off">
        </div>
    </div>

    <div id="resultView">
        <h3 style="margin-top:0; color:#2c3e50;">KẾT QUẢ BÀI HỌC</h3>
        <div style="display: flex; justify-content: space-around; margin: 20px 0;">
            <div style="color:var(--success);">Đã thuộc: <b id="countDone" style="font-size: 24px;">0</b></div>
            <div style="color:var(--danger);">Chưa thuộc: <b id="countNot" style="font-size: 24px;">0</b></div>
        </div>
        <button id="btnLearnNot" class="nav-btn" style="background:var(--primary);" onclick="learnOnlyNot()">HỌC TỪ CHƯA THUỘC</button>
        <button class="nav-btn" style="background:var(--warning); color:#333;" onclick="clearAndRestart()">HỌC LẠI TẤT CẢ</button>
    </div>
    <div id="status">Đang tải...</div>

<script>
    let sessionList = [], index = 0, currentLesson = "";
    let doneWords = [], notWords = [], history = [];
    let synth = window.speechSynthesis, isProcessing = false;

    window.onload = function() {
        if (typeof allData === 'undefined') return;
        const lessons = [...new Set(allData.map(item => item.lesson))].sort((a,b) => a-b);
        const sel = document.getElementById('lessonSelect');
        lessons.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.innerText = "Bài học " + l;
            sel.appendChild(opt);
        });
        const lastL = localStorage.getItem('n1_last_L');
        if (lastL) sel.value = lastL;
        updateSelectDisplay();
        initLesson(false); 
        attachSwipeLogic();
        attachTypingLogic();
    };

    function speak() {
        if (!synth) synth = window.speechSynthesis;
        synth.cancel(); 
        const item = sessionList[index];
        if (!item) return;
        const msg = new SpeechSynthesisUtterance(item.words);
        msg.lang = 'ja-JP';
        msg.rate = 0.8;
        msg.volume = 1;
        synth.speak(msg);
    }

    function flipCard() {
        if (isProcessing) return;
        const card = document.getElementById('cardElement');
        // Phát âm ngay khi bắt đầu lật để Android không chặn loa
        speak();
        card.style.transition = "transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)";
        card.classList.toggle('flipped');
    }

    function attachSwipeLogic() {
        const container = document.getElementById('mainContainer');
        const card = document.getElementById('cardElement');
        let startX = 0, distX = 0, isSwiping = false;

        container.onpointerdown = (e) => {
            if (isProcessing) return;
            // Mồi âm thanh ngay khi chạm xuống (đánh thức bộ loa Android)
            if(synth) { synth.speak(new SpeechSynthesisUtterance("")); }
            startX = e.clientX;
            isSwiping = false;
            container.style.transition = "none";
            container.setPointerCapture(e.pointerId);
        };

        container.onpointermove = (e) => {
            if (startX === 0 || isProcessing) return;
            distX = e.clientX - startX;
            if (Math.abs(distX) > 15) {
                isSwiping = true;
                container.style.transform = `translateX(${distX}px) rotate(${distX/20}deg)`;
                document.getElementById('badgeDone').style.opacity = distX > 80 ? 1 : 0;
                document.getElementById('badgeNot').style.opacity = distX < -80 ? 1 : 0;
            }
        };

        container.onpointerup = (e) => {
            if (startX === 0 || isProcessing) return;
            if (!isSwiping) {
                flipCard();
            } else {
                if (distX > 120) handleMark(true);
                else if (distX < -120) handleMark(false);
                else {
                    container.style.transition = "transform 0.3s";
                    container.style.transform = "translateX(0) rotate(0)";
                }
            }
            document.getElementById('badgeDone').style.opacity = 0;
            document.getElementById('badgeNot').style.opacity = 0;
            startX = 0;
        };
    }

    function attachTypingLogic() {
        const input = document.getElementById('answerInput');
        input.addEventListener('input', (e) => {
            if (isProcessing) return;
            const card = document.getElementById('cardElement');
            const item = sessionList[index];
            if (card.classList.contains('flipped')) return;
            if (e.target.value.trim().toLowerCase() === item.reading.trim().toLowerCase()) {
                flipCard();
                e.target.value = "";
            }
        });
    }

    function handleMark(isOk) {
        if (isProcessing || index >= sessionList.length) return;
        isProcessing = true;
        const container = document.getElementById('mainContainer');
        const card = document.getElementById('cardElement');
        const item = sessionList[index];

        history.push({index: index, type: isOk ? 'done' : 'not'});
        if (isOk) doneWords.push(item); else notWords.push(item);
        
        container.style.transition = "transform 0.4s ease-in, opacity 0.3s";
        container.style.transform = `translateX(${isOk ? 600 : -600}px) rotate(${isOk ? 25 : -25}deg)`;
        container.style.opacity = "0";

        setTimeout(() => {
            card.style.transition = "none";
            card.classList.remove('flipped');
            index++;
            if (index < sessionList.length) render();
            else { saveToLocal(); showResult(); }
        }, 350); 
    }

    function render() {
        isProcessing = false;
        const container = document.getElementById('mainContainer');
        const card = document.getElementById('cardElement');
        const input = document.getElementById('answerInput');
        
        container.style.transition = "none";
        container.style.transform = "translateX(0) rotate(0)";
        container.style.opacity = "1";
        card.classList.remove('flipped');
        
        input.value = "";
        const item = sessionList[index];
        if(!item) return;
        document.getElementById('txtFront').innerText = item.words;
        document.getElementById('txtReading').innerText = item.reading;
        document.getElementById('txtMeaning').innerText = item.meaning;
        document.getElementById('status').innerText = `Từ ${index + 1} / ${sessionList.length}`;
        saveToLocal();
    }

    function initLesson(isForceReset) {
        currentLesson = document.getElementById('lessonSelect').value;
        localStorage.setItem('n1_last_L', currentLesson);
        const savedData = JSON.parse(localStorage.getItem(`save_${currentLesson}`) || "null");
        if (isForceReset || !savedData) {
            sessionList = allData.filter(item => item.lesson == currentLesson);
            index = 0; doneWords = []; notWords = []; history = [];
        } else {
            sessionList = savedData.sessionList; index = savedData.index;
            doneWords = savedData.doneWords; notWords = savedData.notWords; history = savedData.history;
        }
        if (index >= sessionList.length && sessionList.length > 0) showResult();
        else {
            document.getElementById('studyView').style.display = "flex";
            document.getElementById('resultView').style.display = "none";
            render();
        }
    }

    function goBack() {
        if (history.length === 0 || isProcessing) return;
        const last = history.pop();
        if (last.type === 'done') doneWords.pop(); else notWords.pop();
        index = last.index; render();
    }

    function saveToLocal() {
        const data = { sessionList, index, doneWords, notWords, history };
        localStorage.setItem(`save_${currentLesson}`, JSON.stringify(data));
    }

    function showResult() {
        document.getElementById('studyView').style.display = "none";
        document.getElementById('resultView').style.display = "block";
        document.getElementById('countDone').innerText = doneWords.length;
        document.getElementById('countNot').innerText = notWords.length;
        if (notWords.length === 0) {
            let completed = JSON.parse(localStorage.getItem('n1_master_completed') || "[]");
            if (!completed.includes(currentLesson)) {
                completed.push(currentLesson);
                localStorage.setItem('n1_master_completed', JSON.stringify(completed));
                updateSelectDisplay();
            }
        }
    }

    function learnOnlyNot() {
        sessionList = [...notWords]; index = 0; doneWords = []; notWords = []; history = [];
        document.getElementById('studyView').style.display = "flex";
        document.getElementById('resultView').style.display = "none";
        render();
    }

    function clearAndRestart() { initLesson(true); }

    function updateSelectDisplay() {
        const sel = document.getElementById('lessonSelect');
        const completed = JSON.parse(localStorage.getItem('n1_master_completed') || "[]");
        Array.from(sel.options).forEach(opt => {
            let baseText = opt.innerText.replace(" ✅", "");
            opt.innerText = completed.includes(opt.value) ? baseText + " ✅" : baseText;
        });
    }
</script>
</body>
</html>
