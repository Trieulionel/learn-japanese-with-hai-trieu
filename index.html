<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N1 Flashcard - Fix Undo</title>
    <script src="data.js"></script>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --danger: #e74c3c; --warning: #f1c40f; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; touch-action: none; }
        h2 { color: #2c3e50; margin: 15px 0 10px 0; font-size: 18px; }
        #lessonSelect { width: 85%; padding: 12px; border-radius: 12px; border: 2px solid var(--primary); margin-bottom: 10px; font-size: 16px; outline: none; }
        .container { position: relative; width: 90vw; max-width: 400px; height: 260px; perspective: 1200px; }
        .card { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        .front { font-size: 45px; font-weight: bold; }
        .back { transform: rotateY(180deg); }
        .reading { font-size: 30px; color: var(--danger); }
        .meaning { font-size: 20px; color: var(--success); margin-top: 10px; }
        .badge { position: absolute; top: 15px; padding: 5px 12px; border-radius: 5px; color: white; font-weight: bold; opacity: 0; z-index: 10; }
        .badge-right { right: 15px; background: var(--success); }
        .badge-left { left: 15px; background: var(--danger); }
        .control-btns { margin-top: 25px; display: flex; gap: 8px; width: 95%; max-width: 420px; }
        .btn-action { flex: 1; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 14px; }
        .btn-back { background: var(--warning); color: #2c3e50; flex: 0.5; }
        .btn-not { background: var(--danger); }
        .btn-done { background: var(--success); }
        #status { margin-top: auto; padding-bottom: 20px; color: #7f8c8d; font-size: 14px; font-weight: bold; }
        #resultView { display: none; text-align: center; background: white; padding: 25px; border-radius: 20px; width: 85%; }
        .speaker { margin-top: 10px; font-size: 24px; cursor: pointer; background: #eee; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <h2>Learn N1 With Hải Triều</h2>
    <select id="lessonSelect" onchange="loadLesson()"></select>

    <div id="studyView" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="container" id="touchArea">
            <div id="badgeDone" class="badge badge-right">THUỘC</div>
            <div id="badgeNot" class="badge badge-left">CHƯA</div>
            <div class="card" id="cardElement">
                <div class="card-face front" id="txtFront">...</div>
                <div class="card-face back">
                    <div id="txtReading" class="reading"></div>
                    <div id="txtMeaning" class="meaning"></div>
                    <div class="speaker" onclick="speak()">🔊</div>
                </div>
            </div>
        </div>
        <div class="control-btns">
            <button class="btn-action btn-back" onclick="goBack()">↩</button>
            <button class="btn-action btn-not" onclick="handleMark(false)">Chưa thuộc</button>
            <button class="btn-action btn-done" onclick="handleMark(true)">Đã thuộc</button>
        </div>
    </div>

    <div id="resultView">
        <h3>🎉 Hoàn thành!</h3>
        <p>Bạn đã xem hết danh sách từ của bài này.</p>
        <button onclick="resetLessonProgress()" style="padding:15px; background:var(--danger); color:white; border:none; border-radius:12px; width:100%; font-weight:bold;">HỌC LẠI TỪ ĐẦU</button>
    </div>

    <div id="status">Đang nạp dữ liệu...</div>

<script>
    let currentList = [], index = 0, lastAction = null;
    let startX = 0, currentX = 0, isDragging = false, isFlipping = false;

    window.onload = function() {
        if (typeof allData === 'undefined') return;
        const lessons = [...new Set(allData.map(item => item.lesson))].sort((a,b) => a-b);
        const sel = document.getElementById('lessonSelect');
        lessons.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l; opt.innerText = "Bài học " + l;
            sel.appendChild(opt);
        });

        const lastL = localStorage.getItem('n1_current_lesson');
        if (lastL) sel.value = lastL;

        updateSelectDisplay();
        loadLesson();
        attachLogic();
    };

    function updateSelectDisplay() {
        const sel = document.getElementById('lessonSelect');
        const completed = JSON.parse(localStorage.getItem('n1_completed_lessons') || "[]");
        Array.from(sel.options).forEach(opt => {
            let baseText = opt.innerText.replace(" ✅", "");
            opt.innerText = completed.includes(opt.value) ? baseText + " ✅" : baseText;
        });
    }

    function loadLesson() {
        const L = document.getElementById('lessonSelect').value;
        localStorage.setItem('n1_current_lesson', L);
        
        const doneWords = JSON.parse(localStorage.getItem(`done_lesson_${L}`) || "[]");
        currentList = allData.filter(item => item.lesson == L && !doneWords.includes(item.words));

        if (currentList.length === 0) {
            document.getElementById('studyView').style.display = "none";
            document.getElementById('resultView').style.display = "block";
            document.getElementById('status').innerText = "Bài học đã xong!";
        } else {
            const savedIdx = localStorage.getItem(`index_lesson_${L}`);
            index = (savedIdx && parseInt(savedIdx) < currentList.length) ? parseInt(savedIdx) : 0;
            startRound();
        }
    }

    function startRound() {
        document.getElementById('studyView').style.display = "flex";
        document.getElementById('resultView').style.display = "none";
        render();
    }

    function render() {
        const card = document.getElementById('cardElement');
        const L = document.getElementById('lessonSelect').value;
        isFlipping = false;
        card.style.transition = "transform 0.5s";
        card.classList.remove('is-flipped');
        card.style.transform = "rotateY(0deg) translateX(0px)";
        
        localStorage.setItem(`index_lesson_${L}`, index);
        
        const item = currentList[index];
        document.getElementById('txtFront').innerText = item.words;
        document.getElementById('txtReading').innerText = item.reading;
        document.getElementById('txtMeaning').innerText = item.meaning;
        document.getElementById('status').innerText = `Bài ${L}: Từ ${index + 1} / ${currentList.length}`;
    }

    function handleMark(isOk) {
        if (isFlipping || index >= currentList.length) return;
        
        const L = document.getElementById('lessonSelect').value;
        const currentWord = currentList[index].words;
        lastAction = isOk ? 'ok' : 'no';

        if (isOk) {
            let doneWords = JSON.parse(localStorage.getItem(`done_lesson_${L}`) || "[]");
            if (!doneWords.includes(currentWord)) {
                doneWords.push(currentWord);
                localStorage.setItem(`done_lesson_${L}`, JSON.stringify(doneWords));
            }
        }

        const card = document.getElementById('cardElement');
        card.style.transition = "transform 0.4s ease-in";
        let rotY = card.classList.contains('is-flipped') ? "rotateY(180deg)" : "rotateY(0deg)";
        card.style.transform = `translateX(${isOk ? 600 : -600}px) ${rotY} rotate(${isOk ? 30 : -30}deg)`;

        setTimeout(() => {
            if (index < currentList.length - 1) {
                index++; 
                render();
            } else {
                checkEndGame();
            }
        }, 300);
    }

    function goBack() {
        if (index <= 0) return;
        const L = document.getElementById('lessonSelect').value;
        
        // Nếu từ trước đó vừa được bấm "Đã thuộc", ta phải xóa nó khỏi danh sách thuộc để nó hiện lại
        if (lastAction === 'ok') {
            let doneWords = JSON.parse(localStorage.getItem(`done_lesson_${L}`) || "[]");
            doneWords.pop();
            localStorage.setItem(`done_lesson_${L}`, JSON.stringify(doneWords));
        }
        
        index--;
        lastAction = null; // Reset để tránh lùi liên tục làm sai lệch data (hoặc bạn có thể mở rộng nếu muốn)
        render();
    }

    function checkEndGame() {
        const L = document.getElementById('lessonSelect').value;
        const doneWords = JSON.parse(localStorage.getItem(`done_lesson_${L}`) || "[]");
        const totalInLesson = allData.filter(i => i.lesson == L).length;

        if (doneWords.length >= totalInLesson) {
            let completed = JSON.parse(localStorage.getItem('n1_completed_lessons') || "[]");
            if (!completed.includes(L)) completed.push(L);
            localStorage.setItem('n1_completed_lessons', JSON.stringify(completed));
            updateSelectDisplay();
        }
        document.getElementById('studyView').style.display = "none";
        document.getElementById('resultView').style.display = "block";
        document.getElementById('status').innerText = "Hết lượt!";
    }

    function resetLessonProgress() {
        const L = document.getElementById('lessonSelect').value;
        localStorage.removeItem(`done_lesson_${L}`);
        localStorage.removeItem(`index_lesson_${L}`);
        let completed = JSON.parse(localStorage.getItem('n1_completed_lessons') || "[]");
        localStorage.setItem('n1_completed_lessons', JSON.stringify(completed.filter(id => id !== L)));
        location.reload();
    }

    function speak() {
        const text = document.getElementById('txtFront').innerText;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ja-JP'; msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function attachLogic() {
        const area = document.getElementById('touchArea');
        const card = document.getElementById('cardElement');
        const onStart = (e) => {
            if (isFlipping) return;
            startX = (e.type.includes('mouse')) ? e.clientX : e.touches[0].clientX;
            currentX = startX; card.style.transition = "none";
        };
        const onMove = (e) => {
            if (startX === 0 || isFlipping) return;
            let moveX = (e.type.includes('mouse')) ? e.clientX : e.touches[0].clientX;
            const diff = moveX - startX;
            if (Math.abs(diff) > 10) {
                currentX = moveX;
                let rotY = card.classList.contains('is-flipped') ? "rotateY(180deg)" : "rotateY(0deg)";
                card.style.transform = `translateX(${diff}px) ${rotY} rotate(${diff/15}deg)`;
                document.getElementById('badgeDone').style.opacity = diff > 80 ? 1 : 0;
                document.getElementById('badgeNot').style.opacity = diff < -80 ? 1 : 0;
            }
        };
        const onEnd = () => {
            if (startX === 0 || isFlipping) return;
            const diff = currentX - startX;
            if (Math.abs(diff) < 20) {
                isFlipping = true;
                let isBack = card.classList.toggle('is-flipped');
                card.style.transition = "transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)";
                card.style.transform = isBack ? "rotateY(180deg)" : "rotateY(0deg)";
                if(isBack) setTimeout(speak, 200);
                setTimeout(() => { isFlipping = false; }, 500);
            } 
            else if (diff > 120) handleMark(true);
